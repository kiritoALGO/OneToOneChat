<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 24px; border-radius: 12px; width: 100%; max-width: 360px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        h2 { margin-top: 0; }
        form { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; }
        button { background: #2563eb; color: white; border: none; padding: 10px 12px; border-radius: 8px; cursor: pointer; }
        .error { color: #b91c1c; margin-bottom: 8px; }
        .hint { font-size: 13px; color: #64748b; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" value="{{ username|default:'' }}" required>
            <input type="password" name="password" placeholder="Password" value="password123" required>
            <button type="submit">Enter Chat</button>
        </form>
        <div class="hint">Demo users: alice / bob with password password123</div>
    </div>
</body>
</html>
